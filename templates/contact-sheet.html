    <div class="job-strip">

 <div class="three-column-layout bottom-job-panels">

    <div class="form-section compact-section">

        </div>

        <div class="field"><label>Carrier Notes</label><textarea></textarea></div>
    </div>

    <div class="form-section compact-section">
        <h3>Billing Customer</h3>

        <div class="field"><label>Business / Dealer Name</label><input type="text"></div>
        <div class="field"><label>Contact Name</label><input type="text"></div>

        <div class="form-row">

        </div>

        <div class="calculated-box green-total">
